version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
      - "type::chore"
    assignees:
      - "asutermo"
    groups:
      github-actions:
        patterns:
          - "*"
